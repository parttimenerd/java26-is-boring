<svg viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">HTTP protocol comparison visual</title>
  <desc id="desc">Comparison of HTTP 1.1, HTTP 2 and HTTP 3 with a road metaphor.</desc>

  <defs>
    <style>
      .bg { fill: #0f172a; }
      .title { fill: #e2e8f0; font: 700 28px Inter, Segoe UI, Roboto, sans-serif; }
      .rowlabel { fill: #f8fafc; font: 700 24px Inter, Segoe UI, Roboto, sans-serif; }
      .subtitle { fill: #94a3b8; font: 500 16px Inter, Segoe UI, Roboto, sans-serif; }
      .lane { fill: #1e293b; stroke: #334155; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="430" rx="16"/>
  <text class="title" x="40" y="46">HTTP/1.1 vs HTTP/2 vs HTTP/3</text>

  <!-- HTTP/1.1 -->
  <text class="rowlabel" x="40" y="105" fill="#f59e0b">HTTP/1.1</text>
  <text class="subtitle" x="200" y="105">Single lane, request/response head-of-line waiting</text>
  <rect class="lane" x="40" y="120" width="1120" height="64" rx="8"/>
  <line x1="50" y1="152" x2="1150" y2="152" stroke="#475569" stroke-width="2"/>
  <text x="580" y="160" font-size="32">🚗</text>

  <!-- HTTP/2 -->
  <text class="rowlabel" x="40" y="250" fill="#60a5fa">HTTP/2</text>
  <text class="subtitle" x="150" y="250">Multiplexed streams on one TCP connection</text>
  <rect class="lane" x="40" y="265" width="1120" height="84" rx="8"/>
  <line x1="50" y1="289" x2="1150" y2="289" stroke="#475569" stroke-width="2"/>
  <line x1="50" y1="307" x2="1150" y2="307" stroke="#475569" stroke-width="2"/>
  <line x1="50" y1="325" x2="1150" y2="325" stroke="#475569" stroke-width="2"/>
  <text x="410" y="295" font-size="24">🚙</text>
  <text x="640" y="313" font-size="24">🚕</text>
  <text x="870" y="331" font-size="24">🚗</text>

  <!-- HTTP/3 -->
  <text class="rowlabel" x="40" y="390" fill="#34d399">HTTP/3</text>
  <text class="subtitle" x="150" y="390">QUIC over UDP + TLS 1.3, independent streams</text>
  <text x="450" y="392" font-size="26">✈️ ✈️ ✈️ ✈️ ✈️</text>
</svg>
