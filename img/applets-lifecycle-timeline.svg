<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Java applets lifecycle timeline</title>
  <desc id="desc">Timeline showing applets from release in 1995 to removal in Java 26.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .axis { stroke: #475569; stroke-width: 3; }
      .label { fill: #0f172a; font: 700 26px Inter, Segoe UI, Roboto, sans-serif; }
      .small { fill: #334155; font: 500 15px Inter, Segoe UI, Roboto, sans-serif; }
      .year { fill: #0f172a; font: 700 16px Inter, Segoe UI, Roboto, sans-serif; }
      .event { fill: #1f2937; font: 600 16px Inter, Segoe UI, Roboto, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="320" rx="16"/>
  <text class="label" x="40" y="46">Rise and Fall of Java Applets</text>

  <line class="axis" x1="70" y1="170" x2="1130" y2="170"/>

  <!-- 1995 -->
  <g>
    <circle cx="90" cy="170" r="14" fill="#06b6d4"/>
    <line x1="90" y1="156" x2="90" y2="116" stroke="#06b6d4" stroke-width="2"/>
    <text class="year" x="90" y="108" text-anchor="middle">1995</text>
    <text class="event" x="90" y="198" text-anchor="middle">Applets ship</text>
  </g>

  <!-- 2013 -->
  <g>
    <circle cx="610" cy="170" r="14" fill="#3b82f6"/>
    <line x1="610" y1="184" x2="610" y2="226" stroke="#3b82f6" stroke-width="2"/>
    <text class="year" x="610" y="244" text-anchor="middle">2013</text>
    <text class="event" x="610" y="264" text-anchor="middle">Major browsers drop support</text>
  </g>

  <!-- 2017 -->
  <g>
    <circle cx="760" cy="170" r="14" fill="#64748b"/>
    <line x1="760" y1="156" x2="760" y2="116" stroke="#64748b" stroke-width="2"/>
    <text class="year" x="760" y="108" text-anchor="middle">2017</text>
    <text class="event" x="760" y="198" text-anchor="middle">Deprecated</text>
  </g>

  <!-- 2026 -->
  <g>
    <circle cx="1110" cy="170" r="14" fill="#a1a1aa"/>
    <line x1="1110" y1="184" x2="1110" y2="226" stroke="#a1a1aa" stroke-width="2"/>
    <text class="year" x="1110" y="244" text-anchor="middle">2026</text>
    <text class="event" x="1110" y="264" text-anchor="middle">Removed (Java 26)</text>
  </g>

  <text class="small" x="40" y="294">Pattern: signal early, remove slowly, minimize real-world breakage.</text>
</svg>
