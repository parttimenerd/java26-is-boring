<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Java release train timeline before 2017</title>
  <desc id="desc">Timeline from Java 5 to Java 9 showing irregular release gaps that led to the time-based release model.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }
      .axis { stroke: #475569; stroke-width: 3; }
      .label { fill: #0f172a; font: 700 26px Inter, Segoe UI, Roboto, sans-serif; }
      .sub { fill: #334155; font: 500 18px Inter, Segoe UI, Roboto, sans-serif; }
      .small { fill: #334155; font: 500 15px Inter, Segoe UI, Roboto, sans-serif; }
      .note { fill: #0f172a; font: 600 16px Inter, Segoe UI, Roboto, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="360" rx="16"/>
  <text class="label" x="40" y="46">Before 2017: Irregular Releases</text>
  <text class="small" x="40" y="72">Java 5 → 6 → 7 → 8 → 9 (2004–2017)</text>

  <line class="axis" x1="70" y1="190" x2="1130" y2="190"/>

  <!-- Nodes -->
  <g>
    <circle cx="90" cy="190" r="15" fill="#06b6d4"/>
    <text class="sub" x="90" y="146" text-anchor="middle" fill="#06b6d4">Java 5</text>
    <text class="note" x="90" y="228" text-anchor="middle">2004</text>
  </g>

  <g>
    <circle cx="250" cy="190" r="15" fill="#22c55e"/>
    <text class="sub" x="250" y="146" text-anchor="middle" fill="#22c55e">Java 6</text>
    <text class="note" x="250" y="228" text-anchor="middle">2006</text>
  </g>

  <g>
    <circle cx="590" cy="190" r="15" fill="#ec4899"/>
    <text class="sub" x="590" y="146" text-anchor="middle" fill="#ec4899">Java 7</text>
    <text class="note" x="590" y="228" text-anchor="middle">2011</text>
  </g>

  <g>
    <circle cx="820" cy="190" r="15" fill="#f59e0b"/>
    <text class="sub" x="820" y="146" text-anchor="middle" fill="#f59e0b">Java 8</text>
    <text class="note" x="820" y="228" text-anchor="middle">2014</text>
  </g>

  <g>
    <circle cx="1090" cy="190" r="15" fill="#94a3b8"/>
    <text class="sub" x="1090" y="146" text-anchor="middle" fill="#94a3b8">Java 9</text>
    <text class="note" x="1090" y="228" text-anchor="middle">2017</text>
  </g>

  <!-- Gap labels -->
  <text class="small" x="170" y="176" text-anchor="middle">+2 years</text>
  <text class="small" x="420" y="176" text-anchor="middle">+5 years</text>
  <text class="small" x="705" y="176" text-anchor="middle">+3 years</text>
  <text class="small" x="955" y="176" text-anchor="middle">+3.5 years</text>

  <text class="small" x="40" y="324">Context: long delays (especially around modules) drove the switch to a strict 6-month release cadence.</text>
</svg>
